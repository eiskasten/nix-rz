# This example uses YAML anchors which allows reuse of multiple keys 
# without having to repeat yourself.
# Also see https://github.com/Mic92/dotfiles/blob/d6114726d859df36ccaa32891c4963ae5717ef7f/nixos/.sops.yaml
# for a more complex example.

keys:
  - &r3s 4EF3ABE048F0F9104B2EE99E1655AA01E42A9CBC
  - &fucik age13v0mukn6x7dne3raa0jfjvs5duetjt4zj78hjmvh4ew88ytapy8qpssstp
creation_rules:
  # rule for encrypting the VM private key
  - path_regex: modules/secrets/age/.*\.txt\.sops$
    pgp:
      - *r3s

  # normal secrets
  - path_regex: modules/secrets/.*\.(yaml|json|env|ini)$
    pgp:
      - *r3s
    age:
      - *fucik
